<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Business Desk</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        .login-container {
            background: white; padding: 40px; border-radius: 10px; width: 350px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); text-align: center;
        }
        .login-container h2 { margin-bottom: 25px; color: #667eea; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; color: #555; }
        .form-group input {
            width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; outline: none;
        }
        .form-group input:focus { border-color: #667eea; }
        .btn {
            width: 100%; padding: 10px; background: #667eea; color: white; border: none;
            border-radius: 5px; cursor: pointer; font-weight: bold; transition: background 0.3s;
        }
        .btn:hover { background: #5a67d8; }
        .register-link {
            display: block; margin-top: 15px; color: #667eea; text-decoration: none;
        }
        .error-message { color: #dc3545; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Вход в систему</h2>
        <div class="error-message" id="error"></div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Имя пользователя</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn">Войти</button>
        </form>
        <a href="/register" class="register-link">Регистрация</a>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('error');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.textContent = '';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                errorDiv.textContent = 'Введите имя пользователя и пароль';
                return;
            }

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    errorDiv.textContent = data.error || 'Ошибка входа';
                } else {
                    // ✅ Проверяем роль и отправляем на нужную панель
                    if (data.role === 'admin') {
                        window.location.href = '/admin/dashboard';
                    } else {
                        window.location.href = '/dashboard';
                    }
                }
            } catch (err) {
                errorDiv.textContent = 'Ошибка соединения с сервером';
                console.error(err);
            }
        });
    </script>
</body>
</html>
