version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: cursa4go-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 4780
      POSTGRES_DB: business_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  web:
    build: .
    container_name: cursa4go-web
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "host=db user=postgres password=4780 dbname=business_db port=5432 sslmode=disable"
      SECRET_KEY: "my-super-secret-key-change-me"
      PORT: "5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: on-failure

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
