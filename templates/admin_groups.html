<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Группы пользователей</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            font-family: inherit;
            font-size: 14px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn:hover {
            opacity: 0.8;
            transform: translateY(-1px);
        }

        .create-form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .create-form h2 {
            color: #667eea;
            margin-bottom: 15px;
        }

        input, textarea {
            width: 100%;
            margin-bottom: 15px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .groups-table {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .table-header h2 {
            color: #667eea;
        }

        .group-count {
            color: #667eea;
            font-weight: bold;
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8f9fa;
            font-weight: bold;
            color: #667eea;
        }

        tbody tr {
            transition: background-color 0.2s;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        .group-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .group-link:hover {
            text-decoration: underline;
        }

        .users-count {
            background: #4ecdc4;
            color: white;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }

        .empty-message, .loading-message, .error-message {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 16px;
        }

        .error-message {
            color: #dc3545;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗂️ Группы пользователей</h1>
            <div class="nav-buttons">
                <a href="/admin/dashboard" class="btn btn-primary">📊 Дашборд</a>
                <a href="/admin/users/page" class="btn btn-secondary">👥 Пользователи</a>
                <form action="/logout" method="POST" style="display:inline;">
                    <button type="submit" class="btn btn-secondary">Выход</button>
                </form>
            </div>
        </div>

        <div class="create-form">
            <h2>➕ Создать новую группу</h2>
            <form id="createForm">
                <input 
                    id="name" 
                    type="text"
                    placeholder="Название группы *" 
                    required
                    maxlength="100">
                <textarea 
                    id="description" 
                    placeholder="Описание группы (необязательно)" 
                    rows="3"
                    maxlength="500"></textarea>
                <button type="submit" class="btn btn-primary">Создать группу</button>
            </form>
        </div>

        <div class="groups-table">
            <div class="table-header">
                <h2>Все группы</h2>
                <span class="group-count" id="groupCount">Загрузка...</span>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>Название</th>
                        <th>Описание</th>
                        <th style="text-align: center;">Участников</th>
                    </tr>
                </thead>
                <tbody id="groupsBody">
                    <tr>
                        <td colspan="3" class="loading-message">⏳ Загрузка групп...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Загрузка групп
        async function loadGroups() {
            try {
                const res = await fetch('/admin/groups');
                if (!res.ok) throw new Error('Ошибка загрузки');
                
                const groups = await res.json();
                const body = document.getElementById('groupsBody');
                const countSpan = document.getElementById('groupCount');
                
                body.innerHTML = '';
                
                if (!groups || groups.length === 0) {
                    body.innerHTML = '<tr><td colspan="3" class="empty-message">📭 Групп пока нет. Создайте первую группу!</td></tr>';
                    countSpan.textContent = 'Всего: 0';
                    return;
                }
                
                countSpan.textContent = `Всего: ${groups.length}`;
                
                groups.forEach(g => {
                    const tr = document.createElement('tr');
                    const id = g.id || g.ID;
                    const name = g.name || g.Name;
                    const desc = g.description || g.Description || '—';
                    const usersCount = g.Users ? g.Users.length : (g.users ? g.users.length : 0);
                    
                    tr.dataset.groupId = id;
                    tr.innerHTML = `
                        <td>
                            <a href="/admin/groups/${id}/page" class="group-link">
                                🗂️ ${escapeHtml(name)}
                            </a>
                        </td>
                        <td>${escapeHtml(desc)}</td>
                        <td style="text-align: center;">
                            <span class="users-count">👥 ${usersCount}</span>
                        </td>
                    `;
                    body.appendChild(tr);
                });
            } catch (error) {
                console.error('Error loading groups:', error);
                document.getElementById('groupsBody').innerHTML = 
                    '<tr><td colspan="3" class="error-message">❌ Ошибка загрузки групп. Попробуйте обновить страницу.</td></tr>';
                document.getElementById('groupCount').textContent = 'Ошибка';
            }
        }

        // Создание группы
        document.getElementById('createForm').addEventListener('submit', async e => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const description = document.getElementById('description').value.trim();
            
            if (!name) {
                alert('⚠️ Введите название группы');
                return;
            }
            
            const button = e.target.querySelector('button[type="submit"]');
            button.disabled = true;
            button.textContent = 'Создание...';
            
            try {
                const res = await fetch('/admin/groups', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description })
                });
                
                if (res.ok) {
                    alert(`✅ Группа "${name}" успешно создана`);
                    document.getElementById('createForm').reset();
                    await loadGroups();
                } else {
                    const data = await res.json();
                    alert('❌ ' + (data.error || 'Ошибка при создании группы'));
                }
            } catch (error) {
                console.error('Error creating group:', error);
                alert('❌ Ошибка сети. Проверьте подключение к серверу.');
            } finally {
                button.disabled = false;
                button.textContent = 'Создать группу';
            }
        });

        // Экранирование HTML для безопасности
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Загрузка при старте
        loadGroups();
    </script>
</body>
</html>
